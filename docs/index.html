<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>quicmix // mixnet trace</title>
<meta name="description" content="a wargames-style 3d trace of an http request crossing a metadata-private mixnet over quic" />
<style>
  :root{
    --p:#52ff8f; --p-dim:#1f6b3f; --amber:#ffb53d; --cyan:#38e1ff; --rail:#3b82f6; --bg:#02060a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;
    font-family:"SFMono-Regular",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;color:var(--p)}
  #root{position:fixed;inset:0}
  canvas{display:block;touch-action:none}
  .crt{position:fixed;inset:0;pointer-events:none;z-index:5;mix-blend-mode:screen}
  .crt::before{content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.22) 3px,rgba(0,0,0,0) 4px);opacity:.5}
  .vig{position:fixed;inset:0;pointer-events:none;z-index:4;
    background:radial-gradient(ellipse at center,rgba(0,0,0,0) 46%,rgba(0,0,0,.80) 100%)}
  .hud{position:fixed;inset:0;pointer-events:none;z-index:6;text-shadow:0 0 6px rgba(82,255,143,.5);letter-spacing:.03em}
  .frame{position:absolute;border:1px solid var(--p-dim);background:linear-gradient(180deg,rgba(82,255,143,.05),rgba(0,0,0,.20))}
  .top{top:12px;left:12px;right:12px;height:40px;display:flex;align-items:center;justify-content:space-between;
    padding:0 14px;font-size:13px;text-transform:uppercase}
  .top b{color:var(--p)} .top .mode{color:var(--amber)}
  .blink{animation:blink 1.1s steps(2,start) infinite}@keyframes blink{to{opacity:0}}

  .panel{left:12px;bottom:12px;width:min(430px,calc(100% - 24px));padding:13px 15px}
  .panel .lbl{font-size:11px;color:var(--p-dim);text-transform:uppercase;letter-spacing:.16em}
  .panel .step{font-size:19px;color:var(--amber);margin:3px 0 2px;text-transform:uppercase}
  .panel .desc{font-size:13px;line-height:1.5;color:#bdffd4;min-height:2.8em}
  .panel .meter{margin-top:9px;height:6px;background:rgba(82,255,143,.12);border:1px solid var(--p-dim)}
  .panel .meter i{display:block;height:100%;background:var(--p);box-shadow:0 0 8px var(--p);width:0;transition:width .2s linear}

  .ctl{top:62px;left:12px;width:min(430px,calc(100% - 24px));padding:12px 15px;pointer-events:auto}
  .ctl h4{margin:0 0 8px;font-size:11px;color:var(--p-dim);text-transform:uppercase;letter-spacing:.16em}
  .ctl .row{display:flex;gap:7px}
  .ctl input{flex:1;min-width:0;font:inherit;font-size:13px;color:#dffff0;background:rgba(0,0,0,.4);
    border:1px solid var(--p-dim);padding:8px 9px;outline:none}
  .ctl input:focus{border-color:var(--cyan)}
  .ctl button{font:inherit;font-size:12px;color:#02060a;background:var(--p);border:0;padding:0 14px;cursor:pointer;
    text-transform:uppercase;letter-spacing:.05em;font-weight:700}
  .ctl button:disabled{opacity:.45;cursor:default}
  .ctl .gws{display:flex;gap:7px;margin-top:8px}
  .ctl .gw{flex:1;text-align:left;padding:7px 9px;cursor:pointer;color:#bdffd4;background:rgba(56,225,255,.05);
    border:1px solid var(--p-dim);font-size:12px}
  .ctl .gw .ip{font-size:10px;color:var(--p-dim);margin-top:2px}
  .ctl .gw.on{border-color:var(--cyan);color:var(--cyan);background:rgba(56,225,255,.12);box-shadow:0 0 9px rgba(56,225,255,.3)}
  .ctl .note{margin-top:8px;font-size:10.5px;color:var(--p-dim);line-height:1.45}

  .legend{right:12px;bottom:12px;width:min(230px,calc(100% - 24px));padding:11px 13px;font-size:12px}
  .legend h4{margin:0 0 7px;font-size:11px;color:var(--p-dim);text-transform:uppercase;letter-spacing:.16em}
  .legend .row{display:flex;align-items:center;gap:8px;margin:5px 0;color:#cfe}
  .legend .dot{width:9px;height:9px;border-radius:50%;box-shadow:0 0 6px currentColor;flex:none}

  .metrics{right:12px;top:62px;width:min(230px,calc(100% - 24px));padding:11px 13px;font-size:12px}
  .metrics h4{margin:0 0 7px;font-size:11px;color:var(--p-dim);text-transform:uppercase;letter-spacing:.16em}
  .metrics .m{display:flex;justify-content:space-between;margin:4px 0;color:#cfe}
  .metrics .m b{color:var(--cyan);font-weight:600}
  .metrics .m.amber b{color:var(--amber)}

  .nodelabel{font-size:11px;white-space:nowrap;transform:translate(-50%,-170%);text-shadow:0 0 6px rgba(0,0,0,.95);
    letter-spacing:.04em;pointer-events:none;padding:1px 5px;border:1px solid currentColor;border-radius:2px;
    background:rgba(2,6,10,.7)}
  .boot{position:fixed;inset:0;z-index:9;background:var(--bg);display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:10px;color:var(--p);font-size:14px}
  .boot .bar{width:240px;height:8px;border:1px solid var(--p-dim)}
  .boot .bar i{display:block;height:100%;width:30%;background:var(--p);box-shadow:0 0 8px var(--p);animation:load 1.2s ease-in-out infinite alternate}
  @keyframes load{to{width:92%}}
  .err{max-width:520px;text-align:center;color:var(--amber);line-height:1.6;padding:0 20px}
  a{color:var(--cyan)} .hint{position:fixed;left:50%;bottom:4px;transform:translateX(-50%);z-index:6;font-size:10.5px;color:var(--p-dim);pointer-events:none}
</style>
</head>
<body>
  <div id="root"></div>
  <div class="boot" id="boot"><div>quicmix // initializing mixnet trace</div>
    <div class="bar"><i></i></div><div style="font-size:11px;color:var(--p-dim)">loading three · r3f · drei</div></div>
  <div class="vig"></div><div class="crt"></div>
  <div class="hint">drag to look · scroll to zoom · click a gateway dot</div>

<script type="importmap">
{ "imports": {
  "react": "https://esm.sh/react@18.2.0",
  "react-dom": "https://esm.sh/react-dom@18.2.0",
  "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
  "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
  "three": "https://esm.sh/three@0.160.1",
  "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.19?deps=react@18.2.0,react-dom@18.2.0,three@0.160.1",
  "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?deps=react@18.2.0,react-dom@18.2.0,three@0.160.1,@react-three/fiber@8.15.19&exports=Line,Stars,Html,OrbitControls",
  "htm": "https://esm.sh/htm@3.1.1"
} }
</script>

<script type="module">
import React, { useRef, useState, useMemo, useEffect } from "react";
import { createRoot } from "react-dom/client";
import * as THREE from "three";
import { Canvas, useFrame, useThree } from "@react-three/fiber";
import { Line, Stars, Html, OrbitControls } from "@react-three/drei";
import htm from "htm";
const html = htm.bind(React.createElement);

const R = 2, LIFT = 0.42;
// optional: deploy quicmix-bridge and set this to its wss url to go live.
const BRIDGE = "wss://64.226.93.43.nip.io/";

const COLORS = { public:"#3ad17a", nym:"#ff9e3d", tor:"#9d7bff", katzenpost:"#2ee6c0", hopr:"#ffd23f",
                 gateway:"#38e1ff", origin:"#ffffff", rail:"#3b82f6" };

// ---- mixnet clusters: a little cluster of mixnet-colored dots per substrate ----
const MIXNETS = [
  { id:"nym",        center:[48, 9],    n:5, label:"nym mix" },
  { id:"tor",        center:[40,-98],   n:5, label:"tor relay" },
  { id:"katzenpost", center:[35,134],   n:5, label:"katzenpost mix" },
  { id:"hopr",       center:[-18,-52],  n:5, label:"hopr node" },
];
// public routers / web servers (green) — a stable spread over the continents
const PUBLIC = [
  [51,0],[48,2],[52,13],[40,-3],[55,37],[59,18],[41,12],[37,23],[60,25],[53,-6],
  [35,139],[31,121],[22,114],[1,103],[13,100],[28,77],[19,72],[25,55],[-6,106],[14,121],
  [40,-74],[34,-118],[41,-87],[45,-75],[19,-99],[-23,-46],[-34,-58],[4,-74],
  [-26,28],[6,3],[30,31],[-1,36],
  [-33,151],[-37,144],[-41,174],
];

const ll = (lat,lon,r=R)=>{const a=(90-lat)*Math.PI/180,b=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(a)*Math.cos(b), r*Math.cos(a), r*Math.sin(a)*Math.sin(b));};
function slerp(a,b,t){const d=THREE.MathUtils.clamp(a.dot(b),-1,1),o=Math.acos(d);
  if(o<1e-4)return a.clone();const s=Math.sin(o);
  return a.clone().multiplyScalar(Math.sin((1-t)*o)/s).add(b.clone().multiplyScalar(Math.sin(t*o)/s));}
function arcPt(dA,dB,s){return slerp(dA,dB,s).multiplyScalar(R+LIFT*Math.sin(Math.PI*s)+0.02);}
function arcPts(dA,dB,n=40){const o=[];for(let i=0;i<=n;i++)o.push(arcPt(dA,dB,i/n).toArray());return o;}
const ease=t=>t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
function faceOut(v){const q=new THREE.Quaternion();q.setFromUnitVectors(new THREE.Vector3(0,0,1),v.clone().normalize());return q;}

// scatter cluster dots deterministically around a center
function clusterDots(center,n,spread=10){
  const out=[]; let seed=center[0]*31+center[1]*7+n;
  const rnd=()=>{seed=(seed*9301+49297)%233280;return seed/233280;};
  for(let i=0;i<n;i++) out.push([center[0]+(rnd()-0.5)*spread, center[1]+(rnd()-0.5)*spread*1.4]);
  return out;
}

// the deployed gateways you can route through (verified live)
const GATEWAYS = [
  { id:"fra1", provider:"digitalocean fra1", ip:"64.226.93.43", lat:50.11, lon:8.68 },
  { id:"nyc3", provider:"digitalocean nyc3", ip:"68.183.148.148", lat:40.71, lon:-74.01 },
];
const INGRESS = { lat:37.77, lon:-122.42, label:"ingress (you)" };
const ORIGIN  = { lat:51.51, lon:-0.13,   label:"origin" };

function Globe(){
  return html`<group>
    <mesh><sphereGeometry args=${[R-0.012,48,48]}/><meshBasicMaterial color="#020c08"/></mesh>
    <mesh><sphereGeometry args=${[R,36,24]}/><meshBasicMaterial color="#16512f" wireframe transparent opacity=${0.28}/></mesh>
    <mesh><sphereGeometry args=${[R+0.005,64,2]}/><meshBasicMaterial color="#3ad17a" wireframe transparent opacity=${0.4}/></mesh>
  </group>`;
}

function Dot({pos,color,size=0.028,onClick,pulse=false}){
  const ref=useRef();
  useFrame((s)=>{ if(pulse&&ref.current){const k=1+0.35*(Math.sin(s.clock.elapsedTime*3)*0.5+0.5);ref.current.scale.setScalar(k);}});
  return html`<mesh position=${pos.toArray()} onClick=${onClick} ref=${ref}>
    <sphereGeometry args=${[size,12,12]}/><meshBasicMaterial color=${color}/></mesh>`;
}

// background dot field: public routers + mixnet clusters + clickable gateways
function Field({gwIndex,onPick}){
  const pubV=useMemo(()=>PUBLIC.map(p=>ll(p[0],p[1])),[]);
  const mixV=useMemo(()=>MIXNETS.flatMap(m=>clusterDots(m.center,m.n).map(d=>({v:ll(d[0],d[1]),c:COLORS[m.id]}))),[]);
  const gwV=useMemo(()=>GATEWAYS.map(g=>ll(g.lat,g.lon)),[]);
  return html`<group>
    ${pubV.map((v,i)=>html`<${Dot} key=${"p"+i} pos=${v} color=${COLORS.public} size=${0.022}/>`)}
    ${mixV.map((d,i)=>html`<${Dot} key=${"m"+i} pos=${d.v} color=${d.c} size=${0.03}/>`)}
    ${gwV.map((v,i)=>html`<${Dot} key=${"g"+i} pos=${v} color=${COLORS.gateway} size=${0.05}
        pulse=${i===gwIndex} onClick=${(e)=>{e.stopPropagation();onPick(i);}}/>`)}
  </group>`;
}

// the multi-hop path the dial builds. demo = through the mixnets; live = the real gateway hop
function buildPath(gwIndex,live){
  const g=GATEWAYS[gwIndex];
  const nym=clusterDots(MIXNETS[0].center,MIXNETS[0].n)[1];
  const tor=clusterDots(MIXNETS[1].center,MIXNETS[1].n)[1];
  const katz=clusterDots(MIXNETS[2].center,MIXNETS[2].n)[1];
  const hopr=clusterDots(MIXNETS[3].center,MIXNETS[3].n)[1];
  const node=(lat,lon,label,color)=>{const v=ll(lat,lon);return{v,dir:v.clone().normalize(),label,color};};
  if(live){
    return [ node(INGRESS.lat,INGRESS.lon,"ingress (bridge)",COLORS.public),
             node(g.lat,g.lon,`gateway (${g.id})`,COLORS.gateway),
             node(ORIGIN.lat,ORIGIN.lon,"origin",COLORS.origin) ];
  }
  return [ node(INGRESS.lat,INGRESS.lon,INGRESS.label,COLORS.public),
           node(nym[0],nym[1],"nym mix",COLORS.nym),
           node(tor[0],tor[1],"tor relay",COLORS.tor),
           node(katz[0],katz[1],"katzenpost mix",COLORS.katzenpost),
           node(hopr[0],hopr[1],"hopr node",COLORS.hopr),
           node(g.lat,g.lon,`gateway (${g.id})`,COLORS.gateway),
           node(ORIGIN.lat,ORIGIN.lon,"origin",COLORS.origin) ];
}

// neon rail: layered glowing lines through the revealed portion of the path
function Rail({path,reveal,connected}){
  // reveal: float in [0, segCount] — how much of the path is dialed
  const pts=useMemo(()=>{
    const out=[]; const segs=path.length-1;
    for(let s=0;s<segs;s++){
      const full=Math.min(Math.max(reveal-s,0),1); if(full<=0)break;
      const n=Math.max(2,Math.round(40*full));
      for(let i=0;i<=n;i++) out.push(arcPt(path[s].dir,path[s+1].dir,(i/n)*full).toArray());
    }
    return out;
  },[path,reveal]);
  if(pts.length<2) return null;
  if(!connected) return html`<${Line} points=${pts} color="#5cff9a" lineWidth=${1.6} transparent opacity=${0.85} dashed dashSize=${0.06} gapSize=${0.04}/>`;
  return html`<group>
    <${Line} points=${pts} color=${COLORS.rail} lineWidth=${9} transparent opacity=${0.18}/>
    <${Line} points=${pts} color="#5b9bff" lineWidth=${4} transparent opacity=${0.5}/>
    <${Line} points=${pts} color="#bcd6ff" lineWidth=${1.6} transparent opacity=${0.95}/>
  </group>`;
}

function Packet({getState}){
  const ref=useRef(),glow=useRef();
  useFrame(()=>{const{pos,visible}=getState();if(!ref.current)return;
    ref.current.visible=visible;if(glow.current)glow.current.visible=visible;
    if(visible&&pos){ref.current.position.copy(pos);if(glow.current)glow.current.position.copy(pos);}});
  return html`<group>
    <mesh ref=${ref}><sphereGeometry args=${[0.045,16,16]}/><meshBasicMaterial color="#ffffff"/></mesh>
    <pointLight ref=${glow} color=${COLORS.cyan} intensity=${2.4} distance=${1.5}/></group>`;
}

function ActiveLabel({node}){
  if(!node) return null;
  return html`<${Html} position=${node.v.toArray()} center distanceFactor=${8} zIndexRange=${[3,0]}>
    <div class="nodelabel" style=${{color:node.color}}>${node.label}</div></${Html}>`;
}

// ---- the animation driver: dial each hop (2x slower), connect, traverse, loop ----
const DIAL=2.8, CONNECT=1.4, TRAVERSE=5.0, HOLD=2.2;   // seconds (doubled pacing)
function Rig({path,live,liveProg,paused,report,packetState,labelState,railState}){
  const {camera}=useThree();
  const acc=useRef(0), focus=useRef(path[0].dir.clone()), rad=useRef(3.2), lastKey=useRef("");
  const segs=path.length-1;
  const LOOP=segs*DIAL+CONNECT+TRAVERSE+HOLD;
  const key=path.map(p=>p.label).join("|");
  if(key!==lastKey.current){lastKey.current=key;acc.current=0;}
  useFrame((st,dt)=>{
    if(!paused.current) acc.current+=dt;
    let activeIdx=0, reveal=segs, connected=true, pPos=null, pVis=false, phase="";
    if(live){
      // driven by real progress 0..1 across the real sub-path
      const prog=liveProg.current; const f=prog*segs; const s=Math.min(Math.floor(f),segs-1);
      reveal=segs; connected=prog>0.001;
      pPos=arcPt(path[s].dir,path[s+1].dir,f-s); pVis=prog>0&&prog<1;
      activeIdx=Math.min(Math.round(f),segs); phase="live";
    } else {
      const t=acc.current%LOOP;
      if(t<segs*DIAL){const s=Math.floor(t/DIAL),loc=(t-s*DIAL)/DIAL;
        reveal=s+ease(loc);connected=false;activeIdx=s+1;phase="dial";pVis=false;}
      else if(t<segs*DIAL+CONNECT){reveal=segs;connected=true;activeIdx=segs;phase="connect";pVis=false;}
      else if(t<segs*DIAL+CONNECT+TRAVERSE){const loc=(t-segs*DIAL-CONNECT)/TRAVERSE;
        reveal=segs;connected=true;const f=ease(loc)*segs,s=Math.min(Math.floor(f),segs-1);
        pPos=arcPt(path[s].dir,path[s+1].dir,f-s);pVis=true;activeIdx=Math.min(Math.round(f),segs);phase="traverse";}
      else{reveal=segs;connected=true;activeIdx=segs;phase="hold";pVis=false;}
    }
    railState.current={reveal,connected};
    packetState.current={pos:pPos,visible:pVis};
    labelState.current=activeIdx;
    report(activeIdx,phase);

    // camera eases toward the active node; slow
    const tgt=path[Math.min(activeIdx,path.length-1)].dir;
    focus.current=slerp(focus.current,tgt,1-Math.pow(0.004,dt));
    const targetRad=phase==="traverse"||phase==="live"?4.6:3.2;
    rad.current+=(targetRad-rad.current)*(1-Math.pow(0.02,dt));
    const up=new THREE.Vector3(0,1,0);
    camera.position.lerp(focus.current.clone().multiplyScalar(rad.current).add(up.multiplyScalar(0.55)),1-Math.pow(0.02,dt));
    camera.lookAt(0,0,0);
  });
  return null;
}

function Scene({gwIndex,onPick,live,liveProg,paused,report}){
  const path=useMemo(()=>buildPath(gwIndex,live),[gwIndex,live]);
  const packetState=useRef({pos:null,visible:false});
  const labelState=useRef(0); const railState=useRef({reveal:0,connected:false});
  const [rail,setRail]=useState({reveal:0,connected:false});
  const [labelIdx,setLabelIdx]=useState(0);
  // poll the refs into react state at a modest rate (not every frame)
  useFrame((st)=>{ const k=Math.floor(st.clock.elapsedTime*12);
    if(k!==Scene._k){Scene._k=k;
      setRail({...railState.current}); setLabelIdx(labelState.current);} });
  return html`<${React.Fragment}>
    <${Stars} radius=${120} depth=${60} count=${2400} factor=${4} fade speed=${0.5}/>
    <ambientLight intensity=${0.75}/>
    <${Globe}/>
    <${Field} gwIndex=${gwIndex} onPick=${onPick}/>
    <${Rail} path=${path} reveal=${rail.reveal} connected=${rail.connected}/>
    <${Packet} getState=${()=>packetState.current}/>
    <${ActiveLabel} node=${path[Math.min(labelIdx,path.length-1)]}/>
    <${Rig} path=${path} live=${live} liveProg=${liveProg} paused=${paused} report=${report}
      packetState=${packetState} labelState=${labelState} railState=${railState}/>
    <${OrbitControls} enablePan=${false} enableZoom enableRotate minDistance=${2.6} maxDistance=${9}
      enableDamping dampingFactor=${0.08}/>
  </${React.Fragment}>`;
}

const PHASES={dial:"dialing path",connect:"path connected",traverse:"request in flight",hold:"reply via surbs",live:"live trace"};

function App(){
  const paused=useRef(false), liveProg=useRef(0);
  const [gwIndex,setGwIndex]=useState(0);
  const [url,setUrl]=useState("https://example.com");
  const [live,setLive]=useState(false);
  const [info,setInfo]=useState({idx:0,phase:"dial"});
  const [metrics,setMetrics]=useState(null);
  const [status,setStatus]=useState("");
  const wsRef=useRef(null);

  useEffect(()=>{const b=document.getElementById("boot");if(b)b.style.display="none";},[]);
  const report=(idx,phase)=>setInfo(p=>(p.idx===idx&&p.phase===phase)?p:{idx,phase});

  function goLive(){
    const g=GATEWAYS[gwIndex];
    setStatus("connecting to bridge…"); setMetrics(null); liveProg.current=0;
    let ws; try{ ws=new WebSocket(BRIDGE); }catch(e){ setStatus("bridge unreachable — demo mode"); return; }
    wsRef.current=ws;
    const t0=performance.now();
    ws.onopen=()=>{ setLive(true); setStatus("live"); ws.send(JSON.stringify({url,gateway:g.id})); };
    ws.onmessage=(ev)=>{ let m; try{m=JSON.parse(ev.data);}catch{return;}
      if(m.type==="connected") setMetrics(x=>({...(x||{}),handshake:m.handshake_ms,egress:"…"}));
      else if(m.type==="egress") setMetrics(x=>({...(x||{}),egress:m.ip}));
      else if(m.type==="sample"){ setMetrics(x=>({...(x||{}),rtt:m.rtt_ms,cwnd:m.cwnd,lost:m.lost_packets,
        sent:m.sent_packets,bps:m.throughput_bps,rx:m.rx_bytes}));
        // advance the packet by bytes received (cap to ~the file we know we're pulling)
        liveProg.current=Math.min(0.98,(m.rx_bytes/ (5_000_000))*0.9+0.05); }
      else if(m.type==="done"){ const f=m.fetch||{}; setMetrics(x=>({...(x||{}),rtt:m.rtt_ms,lost:m.lost_packets,
        sent:m.sent_packets,code:f.code,bytes:f.bytes,speed:f.speed,total:f.total}));
        liveProg.current=1; setStatus("done"); }
      else if(m.type==="error") setStatus("error: "+m.msg);
      else if(m.type==="log") setStatus(m.msg);
    };
    ws.onerror=()=>{ setStatus("bridge offline — showing demo"); setLive(false); };
    ws.onclose=()=>{ setTimeout(()=>{ setLive(false); liveProg.current=0; },1500); };
  }

  const n=info.idx, phase=info.phase;
  const stepName=PHASES[phase]||"trace";
  const mode=live?"live":"demo";
  const pct = live ? Math.round(liveProg.current*100) : Math.round(((n+1)/7)*100);
  const fmtBps=v=>v?(v/1e6>=1?(v/1e6).toFixed(2)+" mb/s":(v/1e3).toFixed(0)+" kb/s"):"–";

  return html`<${React.Fragment}>
    <${Canvas} camera=${{position:[0,0.6,3.4],fov:52}} gl=${{antialias:true,alpha:false}} dpr=${[1,2]}
      onCreated=${({gl})=>gl.setClearColor("#02060a")}
      onPointerMissed=${()=>{}}
      onPointerDown=${()=>{paused.current=true;}} onPointerUp=${()=>{paused.current=false;}}>
      <${Scene} gwIndex=${gwIndex} onPick=${setGwIndex} live=${live} liveProg=${liveProg} paused=${paused} report=${report}/>
    </${Canvas}>

    <div class="hud">
      <div class="frame top">
        <span><b>quicmix</b> // mixnet trace <span class="blink">_</span></span>
        <span>http get → origin · quic over the mixnet</span>
        <span class="mode">${mode} ${status?("· "+status):""}</span>
      </div>

      <div class="frame ctl">
        <h4>trace a real load · gateway droplet</h4>
        <div class="row">
          <input value=${url} onChange=${e=>setUrl(e.target.value)} placeholder="https://example.com" spellcheck="false"/>
          <button onClick=${goLive}>trace</button>
        </div>
        <div class="gws">
          ${GATEWAYS.map((g,i)=>html`<div key=${g.id} class=${"gw"+(i===gwIndex?" on":"")} onClick=${()=>setGwIndex(i)}>
            <div>${g.provider}</div><div class="ip">${g.ip}</div></div>`)}
        </div>
        <div class="note">click a cyan gateway dot on the globe or a tile above · "trace" runs a REAL fetch through that live droplet and streams real metrics (needs the bridge deployed). idle = the demo dial</div>
      </div>

      <div class="frame metrics">
        <h4>${live?"live metrics":"connection"}</h4>
        <div class="m"><span>egress ip</span><b>${metrics?.egress||(live?"…":"–")}</b></div>
        <div class="m"><span>rtt</span><b>${metrics?.rtt?metrics.rtt.toFixed(1)+" ms":"–"}</b></div>
        <div class="m"><span>throughput</span><b>${fmtBps(metrics?.bps)}</b></div>
        <div class="m"><span>cwnd</span><b>${metrics?.cwnd?(metrics.cwnd/1024).toFixed(0)+" kb":"–"}</b></div>
        <div class="m amber"><span>lost / sent</span><b>${metrics?(`${metrics.lost??0} / ${metrics.sent??0}`):"–"}</b></div>
        <div class="m"><span>status code</span><b>${metrics?.code||"–"}</b></div>
      </div>

      <div class="frame legend">
        <h4>substrates on the globe</h4>
        <div class="row"><span class="dot" style=${{color:COLORS.public}}></span> public router / web server</div>
        <div class="row"><span class="dot" style=${{color:COLORS.nym}}></span> nym mix</div>
        <div class="row"><span class="dot" style=${{color:COLORS.tor}}></span> tor relay</div>
        <div class="row"><span class="dot" style=${{color:COLORS.katzenpost}}></span> katzenpost mix</div>
        <div class="row"><span class="dot" style=${{color:COLORS.hopr}}></span> hopr node</div>
        <div class="row"><span class="dot" style=${{color:COLORS.gateway}}></span> quicmix gateway (clickable)</div>
      </div>

      <div class="frame panel">
        <div class="lbl">step ${live?"live":(n+1+" / 7")} · ${mode}</div>
        <div class="step">${stepName}</div>
        <div class="desc">${live
          ? "a real quicmix connection to the chosen droplet — the request egresses at the gateway's ip and the rail carries real rtt, congestion-window and throughput"
          : "quicmix dials a multi-hop path through the supported mixnets one hop at a time, then lights the neon rail and flies the request across it — drop in a url to run a real one"}</div>
        <div class="meter"><i style=${{width:pct+"%"}}></i></div>
      </div>
    </div>
  </${React.Fragment}>`;
}
Scene._k=-1;

try{ createRoot(document.getElementById("root")).render(html`<${App}/>`); }
catch(e){ const b=document.getElementById("boot");
  if(b) b.innerHTML='<div class="err">trace failed to start — needs a modern browser with es-module + webgl.<br><br>'+
    '<span style="color:#52ff8f">'+(e&&e.message?e.message:e)+'</span><br><br>'+
    'project: <a href="https://github.com/maceip/QUICMIX">github.com/maceip/QUICMIX</a></div>'; }
</script>
</body>
</html>
