<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>quicmix // live demo</title>
<meta name="description" content="a live 3d demo of quicmix carrying an http request across a metadata-private mixnet over quic — pick a real gateway and watch the nodes light up on the globe" />
<style>
  :root{
    --p:#52ff8f; --p-dim:#1f6b3f; --amber:#ffb53d; --cyan:#38e1ff; --rail:#3b82f6; --bg:#02060a;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;
    font-family:"SFMono-Regular",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;color:var(--p)}
  #root{position:fixed;inset:0}
  canvas{display:block;touch-action:none}
  .crt{position:fixed;inset:0;pointer-events:none;z-index:5;mix-blend-mode:screen}
  .crt::before{content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.22) 3px,rgba(0,0,0,0) 4px);opacity:.5}
  .vig{position:fixed;inset:0;pointer-events:none;z-index:4;
    background:radial-gradient(ellipse at center,rgba(0,0,0,0) 46%,rgba(0,0,0,.80) 100%)}
  .hud{position:fixed;inset:0;pointer-events:none;z-index:6;text-shadow:0 0 6px rgba(82,255,143,.5);letter-spacing:.03em}
  /* on desktop these zones are transparent full-screen layers — their children keep their absolute corner
     positions; on mobile (see @media below) they become a top stack + a bottom stack */
  .hud-top,.hud-bottom{position:fixed;inset:0;pointer-events:none}
  .frame{position:absolute;border:1px solid var(--p-dim);background:linear-gradient(180deg,rgba(82,255,143,.05),rgba(0,0,0,.20))}
  .top{top:12px;left:12px;right:12px;height:40px;display:flex;align-items:center;justify-content:space-between;
    padding:0 14px;font-size:13px;text-transform:uppercase}
  .top b{color:var(--p)} .top .mode{color:var(--amber)}
  .blink{animation:blink 1.1s steps(2,start) infinite}@keyframes blink{to{opacity:0}}

  .panel{left:12px;bottom:12px;width:min(430px,calc(100% - 24px));padding:13px 15px}
  .panel .lbl{font-size:11px;color:var(--p-dim);text-transform:uppercase;letter-spacing:.16em}
  .panel .step{font-size:19px;color:var(--amber);margin:3px 0 2px;text-transform:uppercase}
  .panel .desc{font-size:13px;line-height:1.5;color:#bdffd4;min-height:2.8em}
  .panel .meter{margin-top:9px;height:6px;background:rgba(82,255,143,.12);border:1px solid var(--p-dim)}
  .panel .meter i{display:block;height:100%;background:var(--p);box-shadow:0 0 8px var(--p);width:0;transition:width .2s linear}

  .ctl{top:62px;left:12px;width:min(430px,calc(100% - 24px));padding:12px 15px;pointer-events:auto}
  .ctl h4{margin:0 0 8px;font-size:11px;color:var(--p-dim);text-transform:uppercase;letter-spacing:.16em}
  .ctl .row{display:flex;gap:7px}
  .ctl input{flex:1;min-width:0;font:inherit;font-size:13px;color:#dffff0;background:rgba(0,0,0,.4);
    border:1px solid var(--p-dim);padding:8px 9px;outline:none}
  .ctl input:focus{border-color:var(--cyan)}
  .ctl button{font:inherit;font-size:12px;color:#02060a;background:var(--p);border:0;padding:0 14px;cursor:pointer;
    text-transform:uppercase;letter-spacing:.05em;font-weight:700}
  .ctl button:disabled{opacity:.45;cursor:default}
  .ctl .gws{display:flex;gap:7px;margin-top:8px}
  .ctl .gw{flex:1;text-align:left;padding:7px 9px;cursor:pointer;color:#bdffd4;background:rgba(56,225,255,.05);
    border:1px solid var(--p-dim);font-size:12px}
  .ctl .gw .ip{font-size:10px;color:var(--p-dim);margin-top:2px}
  .ctl .gw.on{border-color:var(--cyan);color:var(--cyan);background:rgba(56,225,255,.12);box-shadow:0 0 9px rgba(56,225,255,.3)}
  .ctl .note{margin-top:8px;font-size:10.5px;color:var(--p-dim);line-height:1.45}
  /* intro stage: the url + fetch control is the focus — centred, larger, glowing */
  .ctl.intro{left:50%;top:34%;transform:translate(-50%,-50%);width:min(480px,calc(100% - 32px));
    padding:18px 20px;border-color:rgba(56,225,255,.45);background:linear-gradient(180deg,rgba(6,22,30,.92),rgba(2,8,12,.86));
    box-shadow:0 0 36px rgba(56,225,255,.2);animation:fadeIn .5s ease both}
  .ctl.intro h4{font-size:13px;color:var(--cyan)}
  .ctl.intro input{font-size:15px;padding:11px 12px}
  .ctl.intro button{font-size:14px;padding:0 20px}

  /* the connection / metrics panel: docked on the right during the route, then flies + morphs onto
     the legend when the page is delivered. both states anchor via left+transform so the move tweens. */
  .metrics{position:fixed;font-size:12px;
    transition:left .65s cubic-bezier(.5,.05,.2,1),width .65s cubic-bezier(.5,.05,.2,1),top .65s cubic-bezier(.5,.05,.2,1),transform .65s cubic-bezier(.5,.05,.2,1)}
  .metrics h4{margin:0 0 7px;font-size:11px;color:var(--p-dim);text-transform:uppercase;letter-spacing:.16em}
  .metrics .m{display:flex;justify-content:space-between;gap:8px;margin:4px 0;color:#cfe;white-space:nowrap}
  .metrics .m b{color:var(--cyan);font-weight:600}
  .metrics .m.amber b{color:var(--amber)}
  .metrics.dock{top:calc(100% - 196px);left:calc(100% - 242px);width:230px;padding:11px 13px;animation:fadeIn .5s ease both}
  .metrics.morph{top:58px;left:50%;transform:translateX(-50%);width:min(640px,calc(100% - 24px));padding:9px 16px;
    border-color:rgba(56,225,255,.6);background:linear-gradient(180deg,rgba(6,22,30,.96),rgba(3,11,16,.93));
    box-shadow:0 0 26px rgba(56,225,255,.28);
    display:flex;flex-wrap:wrap;align-items:center;gap:1px 20px}
  .metrics.morph h4{flex-basis:100%;color:var(--cyan);margin:0 0 4px}
  .metrics.morph .m{margin:2px 0}

  .nodelabel{font-size:11px;white-space:nowrap;transform:translate(-50%,-170%);text-shadow:0 0 6px rgba(0,0,0,.95);
    letter-spacing:.04em;pointer-events:none;padding:1px 5px;border:1px solid currentColor;border-radius:2px;
    background:rgba(2,6,10,.7)}
  .boot{position:fixed;inset:0;z-index:9;background:var(--bg);display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:12px;color:var(--p);font-size:14px}
  /* material-3-expressive "squiggle" loader — the fill tracks real module-load progress,
     the wave just undulates for flair (no baseless bouncing) */
  .boot .squig{width:260px;height:26px;overflow:visible}
  .squig-track{stroke:var(--p-dim);stroke-width:3.5;stroke-linecap:round;opacity:.45}
  .squig-wave{fill:none;stroke:var(--p);stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round;
    filter:drop-shadow(0 0 6px var(--p));animation:squigmove 1s linear infinite}
  @keyframes squigmove{to{transform:translateX(-26px)}}   /* exactly one wave period → seamless travel */
  .squig-stop{fill:var(--p);filter:drop-shadow(0 0 5px var(--p))}
  .boot .pct{font-size:12px;color:var(--cyan);letter-spacing:.12em;font-variant-numeric:tabular-nums}
  .err{max-width:520px;text-align:center;color:var(--amber);line-height:1.6;padding:0 20px}
  a{color:var(--cyan)} .hint{position:fixed;left:50%;bottom:4px;transform:translateX(-50%);z-index:6;font-size:10.5px;color:var(--p-dim);pointer-events:none;opacity:0;transition:opacity .5s ease}

  /* dim layer drawn over the globe — used on the landing gate and while traffic is on the tunnel */
  .dim{position:fixed;inset:0;z-index:3;background:#02060a;pointer-events:none;opacity:0;transition:opacity .6s ease}

  /* landing / start gate */

  /* widgets fade in when the globe ui loads */
  .widget{animation:fadeIn .55s ease both}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ── connection legend ── ghost-in-the-shell circuit readout above the globe ── */
  .connlegend{position:fixed;top:58px;left:50%;transform:translate(-50%,-12px);z-index:6;pointer-events:none;
    width:min(640px,calc(100% - 24px));padding:9px 14px 7px;
    border:1px solid rgba(56,225,255,.6);
    background:linear-gradient(180deg,rgba(6,22,30,.96),rgba(3,11,16,.93));
    box-shadow:0 0 30px rgba(56,225,255,.32),inset 0 0 18px rgba(56,225,255,.08);
    opacity:0;transition:opacity .45s ease,transform .45s ease,top .6s cubic-bezier(.5,.05,.2,1)}
  .connlegend.show{opacity:1;transform:translate(-50%,0)}
  /* on the loaded stage the legend drops below the morphed connection bar that flies on top of it */
  .connlegend.loaded{top:130px}
  /* corner ticks for the hud-frame feel */
  .connlegend::before,.connlegend::after{content:"";position:absolute;width:10px;height:10px;
    border:1px solid var(--cyan);pointer-events:none}
  .connlegend::before{top:-1px;left:-1px;border-right:0;border-bottom:0}
  .connlegend::after{bottom:-1px;right:-1px;border-left:0;border-top:0}
  .connlegend .cl-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:1px}
  .connlegend .cl-title{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--cyan);
    text-shadow:0 0 8px rgba(56,225,255,.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .connlegend .cl-jp{font-size:11px;letter-spacing:.1em;color:var(--p);opacity:.85;
    text-shadow:0 0 7px rgba(82,255,143,.5);flex:none}
  .connlegend .cl-jp.act{color:var(--cyan);text-shadow:0 0 8px rgba(56,225,255,.6);animation:cljp 1.4s steps(2,start) infinite}
  @keyframes cljp{50%{opacity:.35}}
  .connlegend .cl-svg{display:block;width:100%;height:auto}
  /* nodes */
  .cl-halo{filter:blur(1.5px)}
  .cl-dot2{transform-box:fill-box;transform-origin:center}
  .cl-dot2.active{animation:cldot 1.3s ease-in-out infinite}
  @keyframes cldot{50%{transform:scale(1.7)}}
  .cl-lbl{font-family:inherit;fill:#bdf3d6;font-size:9px;letter-spacing:.04em;text-anchor:middle}
  .cl-lbl.main{fill:#eafdff;font-size:9.5px}
  .cl-lbl.sub{fill:#6fae93;font-size:7.5px;letter-spacing:.12em;text-transform:uppercase}
  /* edges — base wire, a slow blurred "lava" flow + a sharp "electrical" spark sweeping along it */
  .cl-line{fill:none;stroke:rgba(56,225,255,.6);stroke-width:2;filter:drop-shadow(0 0 4px rgba(56,225,255,.55))}
  .cl-lava{fill:none;stroke:#52ff8f;stroke-width:5;stroke-linecap:round;stroke-dasharray:10 46;
    opacity:.30;filter:blur(2.2px);animation:cllava 3.6s ease-in-out infinite}
  .cl-lava.flow{stroke:#5b9bff;opacity:.55;animation-duration:2.1s}
  @keyframes cllava{to{stroke-dashoffset:-260}}
  .cl-spark{fill:none;stroke:#e8fbff;stroke-width:1.5;stroke-linecap:round;stroke-dasharray:2 30;
    opacity:.5;filter:drop-shadow(0 0 5px #7df9ff);animation:clspark 2s linear infinite}
  .cl-spark.flow{opacity:1;stroke-dasharray:3 20;animation-duration:.85s}
  @keyframes clspark{to{stroke-dashoffset:-300}}

  /* the delivered page — unrolls below the legend on the loaded stage */
  .result{position:fixed;left:50%;top:274px;transform:translateX(-50%);z-index:6;pointer-events:auto;
    width:min(860px,calc(100% - 24px));bottom:86px;display:flex;flex-direction:column;
    border:1px solid rgba(56,225,255,.6);box-shadow:0 0 30px rgba(56,225,255,.22);background:#02060a;overflow:hidden;
    transform-origin:top center;animation:unroll .65s cubic-bezier(.4,.1,.2,1) both}
  @keyframes unroll{from{transform:translateX(-50%) scaleY(.02);opacity:.3}to{transform:translateX(-50%) scaleY(1);opacity:1}}
  .result-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:6px 11px;
    font-size:11px;color:var(--p-dim);text-transform:uppercase;letter-spacing:.08em;
    border-bottom:1px solid rgba(56,225,255,.3);background:linear-gradient(180deg,rgba(56,225,255,.08),transparent)}
  .result-bar b{color:var(--cyan)}
  .result-bar .rb-url{color:#bdffd4;text-transform:none;letter-spacing:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .resultframe{flex:1;width:100%;border:0;background:#fff}

  /* the big neon "start over" control on the loaded stage */
  .startover{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:7;pointer-events:auto;
    font:inherit;font-size:14px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:#02060a;background:var(--p);border:0;padding:13px 32px;cursor:pointer;
    box-shadow:0 0 26px rgba(82,255,143,.55);animation:fadeIn .5s ease both}
  .startover:hover{background:#7dffb0;box-shadow:0 0 36px rgba(82,255,143,.85)}

  /* ─────────────────────────── responsive ───────────────────────────
     phones & folded cover screens: full-width the staged components and stack the loaded
     result so the choreography still reads on a narrow viewport. */
  @media (max-width:700px){
    .top{height:auto;min-height:32px;padding:6px 10px;font-size:11px;flex-wrap:wrap;gap:1px 8px;
      top:max(8px,env(safe-area-inset-top));left:8px;right:8px}
    .top .sub{display:none}
    .top .mode{margin-left:auto}

    /* intro control: centred card, full width */
    .ctl.intro{top:24%;width:calc(100% - 24px);padding:14px 14px}
    .ctl.intro .note{display:none}

    /* connection panel: docked top-left while routing, full-width bar when morphed */
    .metrics.dock{top:auto;bottom:max(8px,env(safe-area-inset-bottom));left:8px;width:min(240px,calc(100% - 16px));padding:9px 11px}
    .metrics.morph{top:50px;width:calc(100% - 16px)}

    /* connection legend full width; drop role captions, enlarge node names */
    .connlegend{width:calc(100% - 16px);padding:8px 10px 6px}
    .connlegend.loaded{top:128px}
    .cl-lbl.sub{display:none}
    .cl-lbl.main{font-size:13px}

    /* delivered page fills the lower screen */
    .result{top:228px;width:calc(100% - 16px);bottom:72px}
    .startover{bottom:14px;font-size:13px;padding:12px 24px}

    .hint{display:none}                  /* touch users don't need the drag/scroll hint */
  }

  /* landscape phones / very short viewports — give the iframe more of the screen */
  @media (max-height:480px){
    .ctl.intro{top:50%}
    .connlegend.loaded{top:74px}
    .result{top:158px;bottom:56px}
  }
</style>

<!-- material-3-expressive squiggle loader: this tiny no-import module runs immediately and animates
     the loading bar while the main module's (static) imports fetch in parallel; the app signals real
     completion via window.__bootFinish on mount. a watchdog surfaces an error if the modules never load. -->
<script type="module">
(function(){
  const boot=document.getElementById("boot"), rect=document.getElementById("squigrect"),
        pct=document.getElementById("bootpct"), wave=document.getElementById("squigwave");
  const SQ_W=260, SQ_P=26, SQ_A=5.5, SQ_MID=13;   // width, wave period, amplitude, midline
  if(wave){ let d="M -26 "+SQ_MID;     // one extra period to the left so the travel animation is seamless
    for(let x=-26;x<=SQ_W;x+=2) d+=" L "+x+" "+(SQ_MID - SQ_A*Math.sin((x/SQ_P)*2*Math.PI)).toFixed(2);
    wave.setAttribute("d",d); }
  let shown=0, finishing=false, last=performance.now();
  (function frame(now){
    const dt=Math.min(0.064,((now||last)-last)/1000); last=now||last;
    // trickle toward a soft 0.9 ceiling while loading; only real completion (finishing) unlocks 100%
    const ceil=finishing?1:0.9;
    shown += (ceil-shown)*(1-Math.exp(-(finishing?9:3.2)*dt)) + (finishing?0.4:0.05)*dt;
    if(shown>ceil) shown=ceil;
    if(rect) rect.setAttribute("width",(shown*SQ_W).toFixed(1));
    if(pct) pct.textContent=Math.round(shown*100)+"%";
    if(finishing && shown>=0.999){ if(boot) boot.style.display="none"; return; }
    if(!boot || boot.style.display!=="none") requestAnimationFrame(frame);
  })();
  window.__bootFinish=()=>{ finishing=true; };   // called by the app once it has mounted
  // watchdog: if the runtime modules never load (offline / blocked cdn), the main module never runs
  setTimeout(()=>{ if(!finishing && boot && boot.style.display!=="none")
    boot.innerHTML='<div class="err">failed to load runtime modules — check your connection and refresh.<br><br>'+
      'needs network access to esm.sh + a modern browser with es-modules and webgl.</div>'; }, 20000);
})();
</script>

<script type="module">
import React, { useRef, useState, useMemo, useEffect } from "react";
import { createRoot } from "react-dom/client";
import * as THREE from "three";
import { Canvas, useFrame, useThree } from "@react-three/fiber";
import { Line, Stars, Html, OrbitControls } from "@react-three/drei";
import htm from "htm";
const html = htm.bind(React.createElement);

const R = 2, LIFT = 0.42;
// the bounce iframe loader on the gateway droplet (quicmix-bounce, behind caddy). it re-serves the
// requested page without X-Frame-Options / frame-ancestors so the result iframe can embed it.
// set to "" to embed the url directly (most sites will then refuse to be framed).
const BOUNCE = "https://64.226.93.43.nip.io/bounce";

const COLORS = { public:"#3ad17a", nym:"#ff9e3d", tor:"#9d7bff", katzenpost:"#2ee6c0", hopr:"#ffd23f",
                 gateway:"#38e1ff", origin:"#ffffff", rail:"#3b82f6" };

// ---- mixnet clusters: a little cluster of mixnet-colored dots per substrate ----
const MIXNETS = [
  { id:"nym",        center:[48, 9],    n:5, label:"nym mix" },
  { id:"tor",        center:[40,-98],   n:5, label:"tor relay" },
  { id:"katzenpost", center:[35,134],   n:5, label:"katzenpost mix" },
  { id:"hopr",       center:[-18,-52],  n:5, label:"hopr node" },
];
// public routers / web servers (green) — a stable spread over the continents
const PUBLIC = [
  [51,0],[48,2],[52,13],[40,-3],[55,37],[59,18],[41,12],[37,23],[60,25],[53,-6],
  [35,139],[31,121],[22,114],[1,103],[13,100],[28,77],[19,72],[25,55],[-6,106],[14,121],
  [40,-74],[34,-118],[41,-87],[45,-75],[19,-99],[-23,-46],[-34,-58],[4,-74],
  [-26,28],[6,3],[30,31],[-1,36],
  [-33,151],[-37,144],[-41,174],
];

const ll = (lat,lon,r=R)=>{const a=(90-lat)*Math.PI/180,b=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(a)*Math.cos(b), r*Math.cos(a), r*Math.sin(a)*Math.sin(b));};
function slerp(a,b,t){const d=THREE.MathUtils.clamp(a.dot(b),-1,1),o=Math.acos(d);
  if(o<1e-4)return a.clone();const s=Math.sin(o);
  return a.clone().multiplyScalar(Math.sin((1-t)*o)/s).add(b.clone().multiplyScalar(Math.sin(t*o)/s));}
function arcPt(dA,dB,s){return slerp(dA,dB,s).multiplyScalar(R+LIFT*Math.sin(Math.PI*s)+0.02);}
function arcPts(dA,dB,n=40){const o=[];for(let i=0;i<=n;i++)o.push(arcPt(dA,dB,i/n).toArray());return o;}
const ease=t=>t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
function faceOut(v){const q=new THREE.Quaternion();q.setFromUnitVectors(new THREE.Vector3(0,0,1),v.clone().normalize());return q;}

// scatter cluster dots deterministically around a center
function clusterDots(center,n,spread=10){
  const out=[]; let seed=center[0]*31+center[1]*7+n;
  const rnd=()=>{seed=(seed*9301+49297)%233280;return seed/233280;};
  for(let i=0;i<n;i++) out.push([center[0]+(rnd()-0.5)*spread, center[1]+(rnd()-0.5)*spread*1.4]);
  return out;
}

// the deployed gateways you can route through (verified live)
const GATEWAYS = [
  { id:"fra1", provider:"digitalocean fra1", ip:"64.226.93.43", lat:50.11, lon:8.68 },
  { id:"nyc3", provider:"digitalocean nyc3", ip:"68.183.148.148", lat:40.71, lon:-74.01 },
];
const INGRESS = { lat:37.77, lon:-122.42, label:"ingress (you)" };
const ORIGIN  = { lat:51.51, lon:-0.13,   label:"origin" };

function Globe({dim=0}){
  const k=1-dim*0.8;     // dim the globe structure while keeping the route (drawn separately) bright
  return html`<group>
    <mesh><sphereGeometry args=${[R-0.012,48,48]}/><meshBasicMaterial color="#020c08"/></mesh>
    <mesh><sphereGeometry args=${[R,36,24]}/><meshBasicMaterial color="#16512f" wireframe transparent opacity=${0.28*k}/></mesh>
    <mesh><sphereGeometry args=${[R+0.005,64,2]}/><meshBasicMaterial color="#3ad17a" wireframe transparent opacity=${0.4*k}/></mesh>
  </group>`;
}

function Dot({pos,color,size=0.028,onClick,pulse=false,opacity=1}){
  const ref=useRef();
  useFrame((s)=>{ if(pulse&&ref.current){const k=1+0.35*(Math.sin(s.clock.elapsedTime*3)*0.5+0.5);ref.current.scale.setScalar(k);}});
  return html`<mesh position=${pos.toArray()} onClick=${onClick} ref=${ref}>
    <sphereGeometry args=${[size,12,12]}/><meshBasicMaterial color=${color} transparent opacity=${opacity}/></mesh>`;
}

// background dot field: public routers + mixnet clusters + clickable gateways
function Field({gwIndex,onPick,dim=0}){
  const pubV=useMemo(()=>PUBLIC.map(p=>ll(p[0],p[1])),[]);
  const mixV=useMemo(()=>MIXNETS.flatMap(m=>clusterDots(m.center,m.n).map(d=>({v:ll(d[0],d[1]),c:COLORS[m.id]}))),[]);
  const gwV=useMemo(()=>GATEWAYS.map(g=>ll(g.lat,g.lon)),[]);
  const op=1-dim*0.72;                       // fade the background dots when the globe dims
  return html`<group>
    ${pubV.map((v,i)=>html`<${Dot} key=${"p"+i} pos=${v} color=${COLORS.public} size=${0.022} opacity=${op}/>`)}
    ${mixV.map((d,i)=>html`<${Dot} key=${"m"+i} pos=${d.v} color=${d.c} size=${0.03} opacity=${op}/>`)}
    ${gwV.map((v,i)=>html`<${Dot} key=${"g"+i} pos=${v} color=${COLORS.gateway} size=${0.05} opacity=${Math.max(op,0.6)}
        pulse=${i===gwIndex} onClick=${(e)=>{e.stopPropagation();onPick(i);}}/>`)}
  </group>`;
}

// even global coverage: a faint, uniformly-distributed dot field (fibonacci sphere) so the globe
// never has bald patches; the meaningful routers / mixnet clusters / gateways sit brighter on top.
function FillField({dim=0}){
  const obj=useMemo(()=>{
    const N=340, pos=[], inc=Math.PI*(3-Math.sqrt(5)), off=2/N, rad=R+0.006;
    for(let i=0;i<N;i++){ const y=i*off-1+off/2; const r=Math.sqrt(Math.max(0,1-y*y)); const phi=i*inc;
      pos.push(Math.cos(phi)*r*rad, y*rad, Math.sin(phi)*r*rad); }
    const g=new THREE.BufferGeometry(); g.setAttribute("position",new THREE.Float32BufferAttribute(pos,3));
    const m=new THREE.PointsMaterial({color:COLORS.public,size:0.02,sizeAttenuation:true,transparent:true,opacity:0.4});
    return new THREE.Points(g,m);
  },[]);
  obj.material.opacity = 0.4*(1-dim*0.82);
  return html`<primitive object=${obj}/>`;
}

// bright markers at every node on the active route — kept full-colour so the route's endpoints
// (client + gateway, both quicmix) and the substrates in between read clearly even as the globe dims
function RouteNodes({path}){
  return html`<group>
    ${path.map((nd,i)=>html`<group key=${"rn"+i} position=${nd.v.toArray()}>
      <mesh><sphereGeometry args=${[0.055,16,16]}/><meshBasicMaterial color=${nd.color} transparent opacity=${0.25}/></mesh>
      <mesh><sphereGeometry args=${[0.03,14,14]}/><meshBasicMaterial color=${nd.color}/></mesh>
    </group>`)}
  </group>`;
}

// the multi-hop path the dial builds. quicmix sits on BOTH sides — a client at the ingress (you) and
// a peer at the gateway — with the mix substrates in the middle, then a final hop out to the domain.
function buildPath(gwIndex,domain){
  const g=GATEWAYS[gwIndex];
  const nym=clusterDots(MIXNETS[0].center,MIXNETS[0].n)[1];
  const tor=clusterDots(MIXNETS[1].center,MIXNETS[1].n)[1];
  const katz=clusterDots(MIXNETS[2].center,MIXNETS[2].n)[1];
  const hopr=clusterDots(MIXNETS[3].center,MIXNETS[3].n)[1];
  const node=(lat,lon,label,color)=>{const v=ll(lat,lon);return{v,dir:v.clone().normalize(),label,color};};
  return [ node(INGRESS.lat,INGRESS.lon,"you · quicmix client",COLORS.gateway),
           node(nym[0],nym[1],"nym mix",COLORS.nym),
           node(tor[0],tor[1],"tor relay",COLORS.tor),
           node(katz[0],katz[1],"katzenpost mix",COLORS.katzenpost),
           node(hopr[0],hopr[1],"hopr node",COLORS.hopr),
           node(g.lat,g.lon,"quicmix gateway",COLORS.gateway),
           node(ORIGIN.lat,ORIGIN.lon,domain||"destination",COLORS.origin) ];
}

// neon rail: layered glowing lines through the revealed portion of the path
function Rail({path,reveal,connected}){
  // reveal: float in [0, segCount] — how much of the path is dialed
  const pts=useMemo(()=>{
    const out=[]; const segs=path.length-1;
    for(let s=0;s<segs;s++){
      const full=Math.min(Math.max(reveal-s,0),1); if(full<=0)break;
      const n=Math.max(2,Math.round(40*full));
      for(let i=0;i<=n;i++) out.push(arcPt(path[s].dir,path[s+1].dir,(i/n)*full).toArray());
    }
    return out;
  },[path,reveal]);
  if(pts.length<2) return null;
  if(!connected) return html`<${Line} points=${pts} color="#5cff9a" lineWidth=${1.6} transparent opacity=${0.85} dashed dashSize=${0.06} gapSize=${0.04}/>`;
  return html`<group>
    <${Line} points=${pts} color=${COLORS.rail} lineWidth=${9} transparent opacity=${0.18}/>
    <${Line} points=${pts} color="#5b9bff" lineWidth=${4} transparent opacity=${0.5}/>
    <${Line} points=${pts} color="#bcd6ff" lineWidth=${1.6} transparent opacity=${0.95}/>
  </group>`;
}

function Packet({getState}){
  const ref=useRef(),glow=useRef();
  useFrame(()=>{const{pos,visible}=getState();if(!ref.current)return;
    ref.current.visible=visible;if(glow.current)glow.current.visible=visible;
    if(visible&&pos){ref.current.position.copy(pos);if(glow.current)glow.current.position.copy(pos);}});
  return html`<group>
    <mesh ref=${ref}><sphereGeometry args=${[0.045,16,16]}/><meshBasicMaterial color="#ffffff"/></mesh>
    <pointLight ref=${glow} color=${COLORS.cyan} intensity=${2.4} distance=${1.5}/></group>`;
}

function ActiveLabel({node}){
  const {camera}=useThree();
  const ref=useRef();
  // occlude: a node on the far hemisphere should be hidden by the globe. the label is DOM (not
  // depth-tested), so hide it when its surface point faces away from the camera.
  useFrame(()=>{ const el=ref.current; if(!el||!node) return;
    const camLen=camera.position.length()||1;
    const facing=node.dir.dot(camera.position)/camLen;       // cos of angle between node dir & view dir
    el.style.opacity = facing > (R/camLen)+0.03 ? "1" : "0"; // R/camLen ≈ the globe's horizon
  });
  if(!node) return null;
  return html`<${Html} position=${node.v.toArray()} center distanceFactor=${8} zIndexRange=${[3,0]}>
    <div ref=${ref} class="nodelabel" style=${{color:node.color}}>${node.label}</div></${Html}>`;
}

// ---- the animation driver: a one-shot routing pass, driven by the app's stage machine ----
// dialRef (0..1) reveals the path hop by hop during "dialing"; trafRef (0..1) flies the packet
// across the connected rail during "traffic". both are plain refs advanced by the app on rAF.
const DIAL_SECS=4.6, TRAFFIC_SECS=4.2;   // seconds for the dial-up and the in-flight phases
function Rig({path,stage,dialRef,trafRef,packetState,labelState,railState}){
  const segs=path.length-1;
  useFrame(()=>{
    let reveal=0, connected=false, pPos=null, pVis=false, activeIdx=-1;
    if(stage==="dialing"){
      const p=ease(Math.min(1,Math.max(0,dialRef.current)));
      reveal=p*segs; connected=false; activeIdx=Math.min(segs,Math.max(0,Math.ceil(reveal)));
    } else if(stage==="traffic"){
      const tp=Math.min(1,Math.max(0,trafRef.current)); const f=tp*segs; const s=Math.min(Math.floor(f),segs-1);
      reveal=segs; connected=true; pPos=arcPt(path[s].dir,path[s+1].dir,f-s); pVis=tp<1;
      activeIdx=Math.min(segs,Math.round(f));
    } else if(stage==="loaded"){
      reveal=segs; connected=true; activeIdx=segs;
    }
    railState.current={reveal,connected};
    packetState.current={pos:pPos,visible:pVis};
    labelState.current=activeIdx;
  });
  return null;
}

function Scene({gwIndex,onPick,stage,dialRef,trafRef,dim,domain}){
  const path=useMemo(()=>buildPath(gwIndex,domain),[gwIndex,domain]);
  const packetState=useRef({pos:null,visible:false});
  const labelState=useRef(-1); const railState=useRef({reveal:0,connected:false});
  const [rail,setRail]=useState({reveal:0,connected:false});
  const [labelIdx,setLabelIdx]=useState(-1);
  // poll the refs into react state at a modest rate (not every frame)
  useFrame((st)=>{ const k=Math.floor(st.clock.elapsedTime*12);
    if(k!==Scene._k){Scene._k=k;
      setRail({...railState.current}); setLabelIdx(labelState.current);} });
  const showRoute = stage!=="intro";
  const litRoute = stage==="traffic" || stage==="loaded";   // bright route markers once the tunnel is up
  return html`<${React.Fragment}>
    <${Stars} radius=${120} depth=${60} count=${2400} factor=${4} fade speed=${0.5}/>
    <ambientLight intensity=${0.75}/>
    <${Globe} dim=${dim}/>
    <${FillField} dim=${dim}/>
    <${Field} gwIndex=${gwIndex} onPick=${onPick} dim=${dim}/>
    ${litRoute?html`<${RouteNodes} path=${path}/>`:null}
    <${Rail} path=${path} reveal=${rail.reveal} connected=${rail.connected}/>
    <${Packet} getState=${()=>packetState.current}/>
    ${showRoute?html`<${ActiveLabel} node=${labelIdx>=0?path[Math.min(labelIdx,path.length-1)]:null}/>`:null}
    <${Rig} path=${path} stage=${stage} dialRef=${dialRef} trafRef=${trafRef}
      packetState=${packetState} labelState=${labelState} railState=${railState}/>
    <${OrbitControls} enablePan=${false} enableZoom enableRotate minDistance=${2.6} maxDistance=${9}
      enableDamping dampingFactor=${0.08} autoRotate autoRotateSpeed=${0.45}/>
  </${React.Fragment}>`;
}

const PHASES={dial:"dialing path",connect:"path connected",traverse:"request in flight",hold:"reply via surbs",live:"live run"};

// reframe the globe for the current viewport — pull back + widen fov on portrait / narrow screens
// (phones, folded cover screens) so the whole globe and its arcs stay in frame; runs on every resize.
function Responsive(){
  const {camera,size}=useThree();
  useEffect(()=>{
    const portrait = size.height >= size.width;
    const narrow = size.width < 560;
    camera.fov = portrait ? 60 : (narrow ? 56 : 52);
    const z = portrait ? 6.6 : (narrow ? 5.8 : 5.2);
    camera.position.set(0, portrait ? 0.45 : 0.9, z);
    camera.updateProjectionMatrix();
  },[size.width,size.height,camera]);
  return null;
}

// the route strip that rises above the globe just before traffic crosses the tunnel.
// mirrors the readme data-path diagram (laptop → quicnet → substrate ↘ substrate → gateway → origin),
// with the camera held still: which hop is live shows here, and traffic flows along the wires.
const CL_NODES=[
  {x:48, y:34, below:false},   // your laptop
  {x:152,y:34, below:false},   // quicnet
  {x:256,y:34, below:false},   // substrate x
  {x:352,y:62, below:true },   // substrate y  ← the "\_>" step down
  {x:456,y:34, below:false},   // quicmix gateway
  {x:560,y:34, below:false},   // origin
];
// orthogonal wire between two nodes — collapses to a straight line when the nodes share a row
function clEdge(i){const A=CL_NODES[i],B=CL_NODES[i+1],mx=(A.x+B.x)/2;
  return `M${A.x},${A.y} L${mx},${A.y} L${mx},${B.y} L${B.x},${B.y}`;}
function ConnectionLegend({route,activeIdx,visible,flowing,title,cls=""}){
  return html`<div class=${"connlegend"+(visible?" show":"")+(cls?" "+cls:"")}>
    <div class="cl-head">
      <span class="cl-jp">接続</span>
      <span class="cl-title">${title}</span>
      <span class=${"cl-jp"+(flowing?" act":"")}>${flowing?"通信中":"待機"}</span>
    </div>
    <svg class="cl-svg" viewBox="0 0 608 96" preserveAspectRatio="xMidYMid meet">
      ${[0,1,2,3,4].map(i=>{const d=clEdge(i);const fl=flowing?" flow":"";
        return html`<${React.Fragment} key=${"e"+i}>
          <path d=${d} class="cl-line"/>
          <path d=${d} class=${"cl-lava"+fl}/>
          <path d=${d} class=${"cl-spark"+fl}/>
        </${React.Fragment}>`;})}
      ${CL_NODES.map((nd,i)=>{const r=route[i];
        const ya=nd.below?nd.y+15:nd.y-19, yb=nd.below?nd.y+25:nd.y-9;
        return html`<${React.Fragment} key=${"n"+i}>
          <circle cx=${nd.x} cy=${nd.y} r=${11} class="cl-halo" fill=${r.color} opacity=${i===activeIdx?0.45:0.16}/>
          <circle cx=${nd.x} cy=${nd.y} r=${4.5} class=${"cl-dot2"+(i===activeIdx?" active":"")}
            fill=${r.color} stroke="#02060a" stroke-width=${1}/>
          <text x=${nd.x} y=${ya} class="cl-lbl main">${r.main}</text>
          <text x=${nd.x} y=${yb} class="cl-lbl sub">${r.sub}</text>
        </${React.Fragment}>`;})}
    </svg>
  </div>`;
}

// pull the hostname out of whatever the user typed, for the destination label + iframe src
function hostOf(u){ try{ return new URL(/^https?:\/\//i.test(u)?u:("https://"+u)).hostname; }
  catch{ return (u||"").replace(/^https?:\/\//i,"").split("/")[0]||"destination"; } }
function urlOf(u){ return /^https?:\/\//i.test(u)?u:("https://"+u); }
const fmtBps=v=>v?(v/1e6>=1?(v/1e6).toFixed(2)+" mb/s":(v/1e3).toFixed(0)+" kb/s"):"–";

function App(){
  // staged flow: intro (enter url) → dialing (path dials up) → traffic (data flows) → loaded (page in iframe)
  const dialRef=useRef(0), trafRef=useRef(0);
  const [gwIndex,setGwIndex]=useState(0);
  const [url,setUrl]=useState("https://www.example.com");
  const [stage,setStage]=useState("intro");
  const [metrics,setMetrics]=useState(null);
  const [,setTick]=useState(0);   // nudges re-render ~15fps so the legend hop + metrics track the refs
  // the two substrates this circuit happens to ride — re-rolled per fetch (unlinkable-rotation flavour)
  const [subPair,setSubPair]=useState([MIXNETS[0],MIXNETS[1]]);

  // hand off from the loading screen to the globe ui directly (no start interstitial)
  useEffect(()=>{
    if(window.__bootFinish) window.__bootFinish();
    else { const b=document.getElementById("boot"); if(b) b.style.display="none"; }
    const h=document.querySelector(".hint"); if(h) h.style.opacity="1";
  },[]);

  function startFetch(){
    const a=Math.floor(Math.random()*MIXNETS.length); let b=Math.floor(Math.random()*(MIXNETS.length-1)); if(b>=a)b++;
    setSubPair([MIXNETS[a],MIXNETS[b]]);
    dialRef.current=0; trafRef.current=0; setMetrics(null); setStage("dialing");
  }
  function reset(){ dialRef.current=0; trafRef.current=0; setMetrics(null); setStage("intro"); }

  // stage driver — advance the active phase's progress on rAF, synth metrics during traffic, then advance the stage
  useEffect(()=>{
    if(stage!=="dialing" && stage!=="traffic") return;
    const dur = stage==="dialing"?DIAL_SECS:TRAFFIC_SECS;
    const ref = stage==="dialing"?dialRef:trafRef;
    const gw = GATEWAYS[gwIndex];
    let raf, last=performance.now(), lastTick=0;
    const step=(now)=>{
      ref.current=Math.min(1, ref.current + (now-last)/1000/dur); last=now;
      if(stage==="traffic" && now-lastTick>66){ lastTick=now; const tp=ref.current;
        setMetrics({ egress:gw.ip, rtt:38+5*Math.sin(tp*7), bps:Math.min(1,tp*1.15)*3.0e6,
          cwnd:(48+tp*44)*1024, lost:Math.floor(tp*4), sent:Math.floor(tp*1500), code: tp>=1?200:null });
      } else if(now-lastTick>66){ lastTick=now; setTick(t=>t+1); }
      if(ref.current>=1){
        if(stage==="dialing") setStage("traffic");
        else { setMetrics({ egress:gw.ip, rtt:41.2, bps:3.0e6, cwnd:92*1024, lost:3, sent:1500, code:200 });
          setStage("loaded"); }
        return;
      }
      raf=requestAnimationFrame(step);
    };
    raf=requestAnimationFrame(step);
    return ()=>cancelAnimationFrame(raf);
  },[stage]);

  const domain=hostOf(url), target=urlOf(url);
  const dim = stage==="intro"?0.5 : stage==="dialing"?0 : stage==="traffic"?0.42 : 0.5;
  const prog = stage==="loaded"?1 : stage==="traffic"?Math.min(1,trafRef.current) : stage==="dialing"?Math.min(1,dialRef.current) : 0;
  const subColor=id=>COLORS[id]||"#5cff9a";
  // quicmix sits on BOTH sides — client (you) at ingress, peer at the gateway — substrates between, then the domain
  const route=[
    {color:"#dffff0",               main:"you",            sub:"client"},
    {color:"#52ff8f",               main:"quicmix",        sub:"ingress"},
    {color:subColor(subPair[0].id), main:subPair[0].label, sub:"substrate"},
    {color:subColor(subPair[1].id), main:subPair[1].label, sub:"substrate"},
    {color:COLORS.gateway,          main:"quicmix",        sub:"gateway"},
    {color:COLORS.origin,           main:domain,           sub:"destination"},
  ];
  const routeActive = Math.round(prog*(route.length-1));
  const legendVisible = stage==="traffic" || stage==="loaded";
  const flowing = stage==="traffic";
  const connTitle = stage==="loaded" ? "circuit complete · page delivered"
    : stage==="traffic" ? "request in flight · constant cell rate"
    : "secure tunnel established";

  return html`<${React.Fragment}>
    <${Canvas} camera=${{position:[0,0.9,5.2],fov:52}} gl=${{antialias:true,alpha:false}} dpr=${[1,2]}
      onCreated=${({gl})=>gl.setClearColor("#02060a")} onPointerMissed=${()=>{}}>
      <${Responsive}/>
      <${Scene} gwIndex=${gwIndex} onPick=${stage==="intro"?setGwIndex:()=>{}} stage=${stage} dialRef=${dialRef} trafRef=${trafRef} dim=${dim} domain=${domain}/>
    </${Canvas}>

    <div class="hud">
      <div class="frame top">
        <span><b>quicmix</b> // live demo <span class="blink">_</span></span>
        <span class="sub">http get over a metadata-private mixnet · quic on both ends</span>
        <span class="mode">${stage}</span>
      </div>

      ${stage==="intro"?html`<div class="frame ctl intro">
        <h4>fetch any site across the mixnet</h4>
        <div class="row">
          <input value=${url} onChange=${e=>setUrl(e.target.value)} placeholder="https://www.example.com"
            spellcheck="false" onKeyDown=${e=>{if(e.key==="Enter")startFetch();}}/>
          <button onClick=${startFetch}>fetch</button>
        </div>
        <div class="gws">
          ${GATEWAYS.map((g,i)=>html`<div key=${g.id} class=${"gw"+(i===gwIndex?" on":"")} onClick=${()=>setGwIndex(i)}>
            <div>${g.provider}</div><div class="ip">${g.ip}</div></div>`)}
        </div>
        <div class="note">enter a url and hit fetch · quicmix dials a multi-hop circuit across the mixnet, then loads the page through the chosen gateway</div>
      </div>`:null}

      ${stage!=="intro"?html`<div class=${"frame metrics "+(stage==="loaded"?"morph":"dock")}>
        <h4>connection${stage==="loaded"?" · metrics":""}</h4>
        <div class="m"><span>egress ip</span><b>${metrics?.egress||"…"}</b></div>
        <div class="m"><span>rtt</span><b>${metrics?.rtt?metrics.rtt.toFixed(1)+" ms":"–"}</b></div>
        <div class="m"><span>throughput</span><b>${fmtBps(metrics?.bps)}</b></div>
        <div class="m"><span>cwnd</span><b>${metrics?.cwnd?(metrics.cwnd/1024).toFixed(0)+" kb":"–"}</b></div>
        <div class="m amber"><span>lost / sent</span><b>${metrics?(`${metrics.lost??0} / ${metrics.sent??0}`):"–"}</b></div>
        <div class="m"><span>status</span><b>${metrics?.code||"–"}</b></div>
      </div>`:null}

      <${ConnectionLegend} route=${route} activeIdx=${routeActive} visible=${legendVisible} flowing=${flowing}
        title=${connTitle} cls=${stage==="loaded"?"loaded":""}/>

      ${stage==="loaded"?html`<div class="result">
        <div class="result-bar"><span>delivered through <b>${GATEWAYS[gwIndex].provider}</b></span>
          <a class="rb-url" href=${target} target="_blank" rel="noopener noreferrer">${target} ↗</a></div>
        <iframe class="resultframe" src=${BOUNCE?(BOUNCE+"?url="+encodeURIComponent(target)+"&gateway="+GATEWAYS[gwIndex].id):target} title="requested page"
          sandbox="allow-scripts allow-same-origin allow-popups allow-forms" referrerpolicy="no-referrer"></iframe>
      </div>`:null}

      ${stage==="loaded"?html`<button class="startover" onClick=${reset}>↻ start over</button>`:null}
    </div>
  </${React.Fragment}>`;
}
Scene._k=-1;

try{ createRoot(document.getElementById("root")).render(html`<${App}/>`); }
catch(e){ const b=document.getElementById("boot");
  if(b) b.innerHTML='<div class="err">demo failed to start — needs a modern browser with es-module + webgl.<br><br>'+
    '<span style="color:#52ff8f">'+(e&&e.message?e.message:e)+'</span><br><br>'+
    'project: <a href="https://github.com/maceip/QUICMIX">github.com/maceip/QUICMIX</a></div>'; }
</script>
</body>
</html>
