[package]
name = "quicmix"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "sync", "net", "io-util", "signal"] }
rand = "0.8"
async-trait = "0.1"
futures = "0.3"
quinn = { version = "0.11", default-features = false, features = ["runtime-tokio", "rustls-ring", "log"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12", "logging"] }
rcgen = "0.13"
anyhow = "1"
# Best-in-class HTTP(S) ingress proxy — off-the-shelf HTTP handling (all methods,
# chunked, keep-alive, header edge cases, h1/h2, Upgrade/WebSocket) instead of a
# hand-rolled parser.
hyper = { version = "1", features = ["server", "client", "http1"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"
bytes = "1"
